name: Manual Production Redeploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing stable release tag to redeploy (for example v0.13.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate stable release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: expected a stable semver tag such as v0.13.0, got '$RELEASE_TAG'."
            exit 1
          fi
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null

      - uses: actions/checkout@v5
        with:
          # Always use the hardened deploy runner from the default branch.
          # The runner itself checks out the exact requested release tag on
          # the host, so redeploying an older release cannot downgrade the
          # safety logic before it runs.
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Redeploy release to production
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            daaronch@${{ secrets.DEPLOY_HOST }} \
            bash -s -- "$RELEASE_TAG" < deploy/deploy.sh
