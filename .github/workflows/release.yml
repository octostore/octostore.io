name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: octostore-linux-amd64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: octostore-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: octostore-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Validate release tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != v* ]]; then
            echo "ERROR: expected release tag to start with 'v', got '$TAG'."
            exit 1
          fi

          TAG_VERSION="${TAG#v}"
          CARGO_VERSION="$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['package']['version'])")"

          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "ERROR: tag version '$TAG_VERSION' does not match Cargo.toml version '$CARGO_VERSION'."
            exit 1
          fi

          echo "Release tag '$TAG' matches Cargo.toml version '$CARGO_VERSION'."

      - name: Build
        run: cargo build --release --bin octostore --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/octostore ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: octostore-*
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate release tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != v* ]]; then
            echo "ERROR: expected release tag to start with 'v', got '$TAG'."
            exit 1
          fi

          TAG_VERSION="${TAG#v}"
          CARGO_VERSION="$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['package']['version'])")"

          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "ERROR: tag version '$TAG_VERSION' does not match Cargo.toml version '$CARGO_VERSION'."
            exit 1
          fi

          git diff --exit-code
          echo "Release tag '$TAG' matches Cargo.toml version '$CARGO_VERSION' and tree is clean."

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Refuse pre-release tags
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -(dev|alpha|beta|rc)([.0-9]*)$ ]]; then
            echo "ERROR: refusing to deploy pre-release tag '$TAG' to production."
            exit 1
          fi
          echo "Tag '$TAG' is a clean release — proceeding."

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            daaronch@${{ secrets.DEPLOY_HOST }} \
            bash /opt/octostore-lock/deploy/deploy.sh ${{ github.ref_name }}
